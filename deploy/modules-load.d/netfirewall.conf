# NetFirewall — modules to load at early boot.
#
# Installed to /etc/modules-load.d/netfirewall.conf by deploy/install.sh
# (the .deb ships it in /usr/lib/modules-load.d/).
#
# Load conntrack before systemd-sysctl.service runs (systemd-sysctl is
# ordered After=systemd-modules-load.service), so the
# net.netfilter.nf_conntrack_acct key in /etc/sysctl.d/netfirewall.conf
# exists when the sysctls are applied. Belt-and-braces with the
# modprobe.d `options nf_conntrack acct=1` default.
nf_conntrack
