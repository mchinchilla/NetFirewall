# /etc/tmpfiles.d/netfirewall.conf — recreated each boot by systemd-tmpfiles.
#
# We can't use RuntimeDirectory= in the daemon unit because systemd doesn't
# expose RuntimeDirectoryGroup=, so the dir lands as root:root and the Web
# user (in group netfirewall) can't traverse to the socket inside, even
# though the socket itself ends up root:netfirewall 0660.
#
# tmpfiles.d creates the dir with the right group from the start; the daemon
# unit no longer declares RuntimeDirectory= for /run/netfirewall.
d /run/netfirewall 0750 root netfirewall -
