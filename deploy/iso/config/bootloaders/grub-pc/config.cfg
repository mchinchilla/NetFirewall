# GRUB menu for the NetFirewall appliance ISO (EFI + BIOS hybrid).
# live-build merges this into the generated grub.cfg. The {LINUX_LIVE} /
# {INSTALL} / {APPEND_*} tokens are substituted by live-build with the right
# kernel/initrd paths and boot append strings (from auto/config bootappend-*).
#
# The BIOS (isolinux) menu is branded separately — see the clone-and-patch
# block in auto/config. Both menus share branding/splash.png as background.

set default=0
set timeout=10

# NetFirewall palette: green accent on black, matching the appliance console.
set color_normal=light-gray/black
set color_highlight=black/green
set menu_color_normal=light-gray/black
set menu_color_highlight=black/green

insmod play
# short beep so a headless operator knows the menu is up
play 480 440 1

menuentry "NetFirewall — Boot live appliance (no changes to disks)" {
    linux  {LINUX_LIVE} {APPEND_LIVE}
    initrd {INITRD_LIVE}
}

menuentry "NetFirewall — Install to disk (guided, asks target disk)" {
    linux  {LINUX_INSTALL} {APPEND_INSTALL}
    initrd {INITRD_INSTALL}
}

# Same preseeded defaults, but surfaces the full installer question flow
# (hostname, partitioning, mirror, ...) for operators who want control.
# Keeps {APPEND_INSTALL} (live-installer needs its args); the later
# auto=false priority=medium override the automated-mode pair in it.
menuentry "NetFirewall — Install to disk (expert mode)" {
    linux  {LINUX_INSTALL} {APPEND_INSTALL} auto=false priority=medium
    initrd {INITRD_INSTALL}
}

menuentry "NetFirewall — Live (failsafe / nomodeset)" {
    linux  {LINUX_LIVE} {APPEND_LIVE} nomodeset noapic noapm nodma nosmp nomce
    initrd {INITRD_LIVE}
}
