# GRUB menu for the NetFirewall appliance ISO (EFI + BIOS hybrid).
# live-build merges this into the generated grub.cfg. The {LINUX_LIVE} /
# {INSTALL} / {APPEND_*} tokens are substituted by live-build with the right
# kernel/initrd paths and boot append strings (from auto/config bootappend-*).

set default=0
set timeout=10

insmod play
# short beep so a headless operator knows the menu is up
play 480 440 1

menuentry "NetFirewall — Boot live appliance" {
    linux  {LINUX_LIVE} {APPEND_LIVE}
    initrd {INITRD_LIVE}
}

menuentry "NetFirewall — Install to disk (automated)" {
    linux  {LINUX_INSTALL} {APPEND_INSTALL}
    initrd {INITRD_INSTALL}
}

menuentry "NetFirewall — Live (failsafe / nomodeset)" {
    linux  {LINUX_LIVE} {APPEND_LIVE} nomodeset noapic noapm nodma nosmp nomce
    initrd {INITRD_LIVE}
}
