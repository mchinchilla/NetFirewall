# Debian-installer preseed for the NetFirewall appliance (--debian-installer live).
# Goal: a near-hands-off bare-metal install that lays the live filesystem to a
# single disk and boots into the same first-boot provisioning flow as the live
# image.
#
# This is an APPLIANCE installer: guided whole-disk, single ext4 + swap, no LVM,
# no RAID, no desktop, no extra users. Adjust before production if you need
# encryption / LVM.
#
# Exactly TWO questions are left interactive on purpose (everything else is
# preseeded): which disk to install to, and the final "write changes to disk?"
# confirmation. Both are critical-priority, so they surface even with the
# boot append `priority=critical`. A wrong-disk wipe is unrecoverable — the
# operator must pick the target explicitly.

### Localization (override at boot if needed) ###
d-i debian-installer/locale          string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network ###
# Let the installer DHCP on the first NIC just to complete; the installed system
# uses our ifupdown bootstrap + SetupWizard for the real config.
d-i netcfg/choose_interface          select auto
d-i netcfg/get_hostname              string netfirewall
d-i netcfg/get_domain                string local
d-i netcfg/hostname                  string netfirewall

### Mirror — offline install: use the CD, no network mirror ###
d-i apt-setup/use_mirror             boolean false
d-i apt-setup/cdrom/set-first        boolean false
d-i apt-setup/cdrom/set-next         boolean false
d-i apt-setup/cdrom/set-failed       boolean false

### Clock ###
d-i clock-setup/utc                  boolean true
d-i time/zone                        string UTC
d-i clock-setup/ntp                  boolean true

### Partitioning — guided, entire disk, single ext4 + swap, no LVM/RAID ###
# partman-auto/disk is deliberately NOT preseeded: with more than one disk the
# installer ASKS which one to use (critical priority, so it shows even under
# `priority=critical`); with exactly one disk it selects it automatically.
# Hardcoding /dev/sda here caused installs onto the wrong disk (USB media often
# enumerates as sda, internal NVMe as nvme0n1) and appliances that "didn't boot".
# For a fully unattended install on known hardware, re-add e.g.:
#   d-i partman-auto/disk            string /dev/nvme0n1
d-i partman-auto/method              string regular
d-i partman-auto/choose_recipe       select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition         select finish
# partman/confirm{,_nooverwrite} are deliberately NOT preseeded — the operator
# gets one final "write the changes to disk?" screen naming the disk that is
# about to be wiped. Preseed both to `boolean true` to go fully unattended.
d-i partman-md/confirm               boolean true
d-i partman-lvm/confirm              boolean true

### Root account ###
# Live install copies the live root account. We still lock a root password here;
# the appliance is administered via console (netfirewall-tui) + the web UI. Set a
# real password by uncommenting and editing the line below, or via the boot menu.
d-i passwd/root-login                boolean true
d-i passwd/make-user                 boolean false
# d-i passwd/root-password           password CHANGE-ME
# d-i passwd/root-password-again     password CHANGE-ME
d-i passwd/root-password-crypted     password *

### Software selection — headless appliance, no tasksel desktop ###
tasksel tasksel/first                multiselect
d-i pkgsel/include                   string
d-i pkgsel/upgrade                   select none
popularity-contest popularity-contest/participate boolean false

### Bootloader ###
d-i grub-installer/only_debian       boolean true
d-i grub-installer/with_other_os     boolean true
# "default" = the disk partman installed to (correct now that the operator
# picks the disk explicitly above).
d-i grub-installer/bootdev           string default
# UEFI robustness — the #1 cause of "installed fine but won't boot":
# also install GRUB to the removable fallback path (\EFI\BOOT\BOOTX64.EFI).
# Many firmwares (and VMs without persistent NVRAM, e.g. Proxmox/QEMU OVMF
# without an EFI vars disk) lose or ignore the NVRAM boot entry that
# grub-install registers; the fallback path boots regardless.
d-i grub-installer/force-efi-extra-removable boolean true
# If the machine booted the ISO in UEFI mode, install UEFI GRUB even when
# leftover BIOS-mode OSes are detected on other disks — don't stop to ask.
d-i partman-efi/non_efi_system       boolean true

### Finish ###
d-i finish-install/reboot_in_progress note
d-i debian-installer/exit/reboot     boolean true

# Ensure the firstboot provisioner is enabled in the INSTALLED system (the live
# filesystem already enabled it, but be explicit — this is the load-bearing
# guarantee that a freshly installed appliance provisions per-machine secrets).
d-i preseed/late_command             string \
    in-target systemctl enable netfirewall-firstboot.service postgresql.service netfirewall-daemon.service netfirewall-web.service netfirewall-bootstrap.service netfirewall-issue-banner.service || true ; \
    in-target systemctl enable netfirewall-nic-bootstrap.service || true
