# NetFirewall — kernel tunables.
#
# Installed to /etc/sysctl.d/netfirewall.conf by deploy/install.sh.
# Applied at boot by systemd-sysctl.service; apply now with:
#   sysctl --system  (or sysctl -p /etc/sysctl.d/netfirewall.conf)

# Make the kernel track per-flow byte/packet counters in conntrack.
# Without this, `conntrack -L` omits the `bytes=` fields and the top-talkers
# panel on the dashboard stays empty. Disabled by default on Debian; trivial
# CPU overhead (single u64 increment per packet) on a home/small-office box.
net.netfilter.nf_conntrack_acct = 1

# ─────────────────────────── Kernel hardening ───────────────────────────
# Low-risk, high-value defaults for a router. None of these break legitimate
# traffic on a normal home/SMB gateway; they close common spoofing/amplification
# vectors that nftables alone can't fully cover.

# SYN cookies — survive a SYN flood once the backlog fills, instead of dropping
# legitimate handshakes. Complements the nftables SYN rate-limit rule.
net.ipv4.tcp_syncookies = 1

# Reverse-path filtering is INTENTIONALLY NOT set here. Dual-WAN + per-WAN policy
# routing produces asymmetric return paths, so this deployment ships rp_filter=2
# (loose) per-interface in /etc/sysctl.d/99-forward.conf. Setting conf.all=1
# (strict) here would override that (effective rp_filter = max(all, iface)) and
# break failover when traffic returns via the other WAN. The explicit nftables
# bogon-source drops (seed_tekium_antispoof.sql) provide the anti-spoof instead.
#   net.ipv4.conf.all.rp_filter      ← left to 99-forward.conf (loose, =2)
#   net.ipv4.conf.default.rp_filter

# Ignore ICMP echo to broadcast/multicast — defeats smurf amplification.
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Don't accept ICMP redirects — an on-link attacker could otherwise rewrite our
# routing table. A router should never accept redirects.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Don't send ICMP redirects either (we're the gateway; clients shouldn't be told
# to route around us).
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Reject source-routed packets — legacy feature, pure spoofing vector today.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Log packets with impossible (martian) source addresses — visibility into spoof
# attempts. Kernel rate-limits this, so it won't flood the log.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1
