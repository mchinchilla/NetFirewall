# NetFirewall — kernel tunables.
#
# Installed to /etc/sysctl.d/netfirewall.conf by deploy/install.sh.
# Applied at boot by systemd-sysctl.service; apply now with:
#   sysctl --system  (or sysctl -p /etc/sysctl.d/netfirewall.conf)

# Make the kernel track per-flow byte/packet counters in conntrack.
# Without this, `conntrack -L` omits the `bytes=` fields and the top-talkers
# panel on the dashboard stays empty. Disabled by default on Debian; trivial
# CPU overhead (single u64 increment per packet) on a home/small-office box.
net.netfilter.nf_conntrack_acct = 1
