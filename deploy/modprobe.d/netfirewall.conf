# NetFirewall — kernel module parameters.
#
# Installed to /etc/modprobe.d/netfirewall.conf by deploy/install.sh
# (the .deb ships it in /usr/lib/modprobe.d/).
#
# Make per-flow byte/packet accounting the DEFAULT whenever nf_conntrack
# loads. This is the authoritative fix for the top-talkers panel going dark
# after a reboot: systemd-sysctl.service applies /etc/sysctl.d/ early in
# boot, but net.netfilter.nf_conntrack_acct does not exist until the
# nf_conntrack module is loaded (which happens later, when the nftables
# ruleset with `ct` rules is applied) — so the sysctl write is silently
# skipped and the module comes up with its compiled-in default (acct=0).
# A module parameter has no such ordering problem: it takes effect at load
# time, whenever that is.
options nf_conntrack acct=1
