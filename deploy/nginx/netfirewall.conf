# Example reverse-proxy config for NetFirewall. Drop into
#   /etc/nginx/sites-available/netfirewall.conf
# then enable with `ln -s ../sites-available/netfirewall.conf /etc/nginx/sites-enabled/`
# and reload (`nginx -s reload`).
#
# This terminates TLS at nginx and proxies HTTP to the unprivileged Web on
# 127.0.0.1:5000. The __Host- session cookie REQUIRES the request to be HTTPS,
# so without a cert here login won't work.
#
# Replace `netfirewall.local` with your hostname and point the cert paths to
# wherever certbot / your CA dropped them.

upstream netfirewall_web {
    server 127.0.0.1:5000 fail_timeout=10s max_fails=3;
    keepalive 16;
}

# 80 → 443 redirect.
server {
    listen 80;
    listen [::]:80;
    server_name netfirewall.local;

    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name netfirewall.local;

    ssl_certificate         /etc/letsencrypt/live/netfirewall.local/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/netfirewall.local/privkey.pem;

    # TLS hardening (Mozilla intermediate, March 2025).
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache       shared:SSL:10m;
    ssl_session_timeout     1d;
    ssl_session_tickets     off;
    ssl_stapling            on;
    ssl_stapling_verify     on;

    # Security headers — most are also set by the app, but defense-in-depth.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # NetFirewall is single-tenant — block clients far from the admin.
    # Comment out or widen if you administer remotely.
    # allow 192.168.0.0/16;
    # allow 10.0.0.0/8;
    # deny  all;

    client_max_body_size 4M;

    location / {
        proxy_pass         http://netfirewall_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 5s;

        # HTMX swaps + SSE-style flushes — buffering off is friendlier.
        proxy_buffering     off;
    }

    # Static assets are served by Kestrel; cache them aggressively at the edge.
    location ~* \.(css|js|svg|png|jpg|woff2?)$ {
        proxy_pass http://netfirewall_web;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
